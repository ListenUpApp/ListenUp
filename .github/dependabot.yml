version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: monthly
    groups:
      gradle-dependencies:
        patterns: ["*"]
    ignore:
      # Kotlin-coupled toolchain unit — bumps in lockstep with the Kotlin version,
      # maintainer-managed (see the "upgrade UNIT" comment in gradle/libs.versions.toml).
      - dependency-name: "org.jetbrains.kotlin:*"        # kotlin-gradle-plugin
      - dependency-name: "org.jetbrains.kotlin.*"        # KGP plugin ids (android/multiplatform/jvm/plugin.compose/plugin.serialization)
      - dependency-name: "com.google.devtools.ksp*"      # KSP plugin + symbol-processing-api
      - dependency-name: "dev.mokkery*"                  # Mokkery plugin + runtime (compiler-plugin-locked)
      - dependency-name: "dev.zacsweers.kctfork:*"       # kotlin-compile-testing fork (compiler-locked)
      - dependency-name: "org.jetbrains.kotlinx:kotlinx-rpc*"   # kotlinx-rpc artifacts (dev-channel redirector)
      - dependency-name: "org.jetbrains.kotlinx.rpc.plugin"     # kotlinx-rpc Gradle plugin
      # Deliberate pins.
      - dependency-name: "dev.detekt*"                   # detekt 2.0.0-alpha.5 — maintainer-decided alpha pin
      - dependency-name: "org.jetbrains.compose.material3:material3"  # 1.11.0-alpha07 — upstream-blocked
      # Transitive BUILD/TEST-tooling only — never on a shipped or runtime classpath. Verified absent
      # from :server jvmRuntimeClasspath and all native configs (shipped artifact is a Kotlin/Native
      # server.kexe with zero JVM jars) and from :androidApp releaseRuntimeClasspath (nothing in the
      # APK). Versions are owned by AGP / the Kotlin Swift Export worker / a test-only JWT lib and move
      # only when those toolchains bump, so per-artifact Dependabot PRs here are pure churn.
      - dependency-name: "io.netty:*"                    # AGP Unified Test Platform (grpc-netty emulator control) — not our server (Ktor CIO)
      - dependency-name: "io.grpc:*"                      # ditto (UTP emulator-control channel)
      - dependency-name: "org.bouncycastle:*"            # AGP apksig (APK signing); GOST-cipher CVE path unused
      - dependency-name: "org.bitbucket.b_c:jose4j"      # AGP bundletool
      - dependency-name: "org.jdom:jdom2"                # AGP tooling
      - dependency-name: "io.opentelemetry:*"            # Kotlin Swift Export worker classpath
      - dependency-name: "org.apache.commons:commons-lang3"      # AGP tooling transitive
      - dependency-name: "org.apache.httpcomponents:httpclient"  # AGP tooling transitive (4.x; not the server's httpclient5)
      - dependency-name: "com.fasterxml.jackson.core:jackson-databind"  # :server jvmTest only (auth0 java-jwt oracle); no Jackson in prod
