# Keeps the OSS license manifest (app/sharedUI/.../aboutlibraries.json) in sync with the dependency
# catalog automatically. Dependabot bumps `gradle/libs.versions.toml` but cannot run Gradle, so it
# never regenerates the manifest — which then fails the `verifyLicenses` gate on main. This workflow
# regenerates it on Linux (the authoritative platform — a macOS regen produces a different manifest
# and must never be committed) and opens a fix PR whenever it drifts.
#
# Runs on: a dependency/build change landing on main (the Dependabot-merge case), or on demand
# (workflow_dispatch — use this to heal main right now).
name: Regenerate License Manifest

on:
  push:
    branches: [main]
    paths:
      - 'gradle/libs.versions.toml'
      - '**/build.gradle.kts'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: regenerate-licenses
  cancel-in-progress: true

jobs:
  regenerate:
    name: Regenerate aboutlibraries.json
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # Rewrites app/sharedUI/src/commonMain/composeResources/files/aboutlibraries.json in place from the
      # current dependency graph. Deterministic (sorted entries, timestamp metadata disabled), so a
      # clean run leaves no diff.
      - name: Regenerate license manifest (Linux is authoritative)
        run: ./gradlew :app:sharedUI:exportLibraryDefinitions --no-daemon

      - name: Open a fix PR if the manifest drifted
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          MANIFEST="app/sharedUI/src/commonMain/composeResources/files/aboutlibraries.json"

          if git diff --quiet -- "$MANIFEST"; then
            echo "License manifest already in sync with the dependency catalog — nothing to do."
            exit 0
          fi

          echo "Manifest drifted — opening a regeneration PR."
          BRANCH="chore/regenerate-licenses-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "$MANIFEST"
          git commit -m "🔖 chore(licenses): regenerate aboutlibraries.json for dependency changes"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "🔖 chore(licenses): regenerate aboutlibraries.json (dependency bump)" \
            --body "Automated — a dependency change altered the OSS license set, so \`exportLibraryDefinitions\` regenerated the manifest on Linux (the platform CI's \`verifyLicenses\` gate compares against). Merging this makes \`verifyLicenses\` pass again."
