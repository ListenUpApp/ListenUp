name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Least-privilege GITHUB_TOKEN for every job — nothing in CI writes to GitHub.
# Matches the job-level scoping convention in release.yml.
permissions:
  contents: read

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# CI is organized into three conceptual stages — Lint, Test, Build — each spanning the
# lanes a stage needs. Mobile-focused: Linux lane (shared Kotlin + server + Android) and
# macOS lane (iOS). Desktop has no dedicated build/test job, but test-jvm compiles
# :app:desktopApp (JVM target) so entry-point drift against shared composable signatures
# fails fast — that surface isn't otherwise touched by the Android/iOS builds.
jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Lint (Spotless + Detekt)
        run: ./gradlew spotlessCheck detekt --no-daemon

      # SwiftLint runs on Linux against .swift source (no Xcode needed) via the official
      # container, pinned (0.63.3 — keep CLAUDE.md's local-commands row in sync when bumping).
      # Non-strict: error-severity violations gate; style is advisory. Config: iosApp/.swiftlint.yml.
      - name: Run SwiftLint (iOS)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/iosApp:/work" -w /work \
            ghcr.io/realm/swiftlint:0.63.3 \
            swiftlint lint --reporter github-actions-logging

      - name: Upload Detekt report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: detekt-report
          path: build/reports/detekt/
          retention-days: 7

  # ── Supply chain ─────────────────────────────────────────────────────────────
  dependency-graph:
    name: Submit dependency graph
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      # Overrides the workflow-level `contents: read` — the dependency-graph
      # submission API writes the resolved graph back to the repository.
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Review new dependencies
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  # ── Test ─────────────────────────────────────────────────────────────────────
  test-jvm:
    name: Test (JVM)
    runs-on: ubuntu-latest
    # 45m (matching the macOS lanes) is a safety net for a genuine deadlock. The real cause of the
    # old ~25m stalls / OOM-fails was the Kotlin compiler daemon hitting its -Xmx ceiling on the
    # grown :server source (fixed by raising kotlin.daemon.jvmargs to 6G in gradle.properties), not
    # a timeout or parallelism issue — this runner is the public 4-core/16G tier with RAM to spare.
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # Drift gate: regenerates localization artifacts from en.json into memory and
      # compares against the committed Android strings.xml + iOS Localizable.xcstrings,
      # failing with a per-file message if en.json was edited without regenerating (or
      # an artifact was hand-edited).
      - name: Verify localization artifacts in sync
        run: ./gradlew :app:sharedUI:verifyStrings --no-daemon

      # Drift gate: regenerates the OSS license manifest from the dependency graph
      # and fails if the committed aboutlibraries.json is out of sync (e.g. a
      # catalog bump landed without re-running exportLibraryDefinitions).
      - name: Verify license manifest in sync
        run: ./gradlew :app:sharedUI:verifyLicenses --no-daemon

      # The Swift half of the localization contract. verifyStrings proves the generated
      # artifacts match en.json but cannot see which keys Swift asks for; iOS renders a
      # missing key as its own text, so a typo ships as visible garbage with nothing red.
      # Xcode also hides it locally by writing the missing key back into the generated
      # catalog as an empty entry. Found 5 live raw-key bugs the day it was added.
      - name: Verify iOS Swift localization keys exist
        run: ./gradlew :app:sharedUI:verifySwiftStringKeys --no-daemon

      # :app:desktopApp is a thin entry-point wrapper over :app:sharedUI/:app:sharedLogic — neither
      # the Android nor the iOS build compiles it, so a shared composable signature
      # change (e.g. #1183) can drift the desktop callers silently until someone builds
      # desktop by hand. Cheap JVM compile; fails fast, ahead of the full test run.
      - name: Compile :app:desktopApp
        run: ./gradlew :app:desktopApp:compileKotlin --no-daemon

      # Kotest across the contract DTOs, the shared client core (every client consumes
      # :app:sharedLogic), and the server. :app:sharedUI host tests are Robolectric (JVM, no
      # emulator) — included here so Compose-UI test rot can't land unnoticed.
      # compileCommonMainKotlinMetadata type-checks :app:sharedLogic commonMain against the COMMON
      # (all-targets-intersection) stdlib, so JVM-only stdlib in shared code (e.g. toSortedSet(),
      # java.*) fails here on Linux instead of late on the macOS iOS lane.
      # :build-logic:convention:test runs the build-logic convention tests, including
      # ReturnValueGuardCanaryTest — the compiler-flag canary that fails if a Kotlin bump
      # silently disarms the AppResult must-use guard.
      # :tools:rpc-guard-ksp:test and :build-logic:detekt-rules:test gate the guards themselves.
      # Both suites previously ran nowhere gating (rpc-guard-ksp only under the
      # continue-on-error Kover step; detekt-rules under nothing at all), so the
      # RPC exception-guard processor and the custom detekt rules could rot green —
      # the rules are the only thing enforcing CLAUDE.md security rule 6 (no stacktrace
      # crosses the wire) and the en.json localization contract.
      - name: Run JVM tests
        run: ./gradlew :app:sharedLogic:compileCommonMainKotlinMetadata :contract:jvmTest :app:sharedLogic:jvmTest :app:sharedLogic:testAndroidHostTest :server:jvmTest :app:sharedUI:testAndroidHostTest :tools:rpc-guard-ksp:test :build-logic:convention:test :build-logic:detekt-rules:test --no-daemon

      # Generated-and-committed artifacts must match what this build regenerates. Room's
      # schemaDirectory points at the tracked app/sharedLogic/schemas/, so every KSP run rewrites
      # the current version's JSON IN PLACE — an entity change whose regenerated schema was
      # never committed lands green today (CI regenerates it fresh, and the migration tests
      # run against the regenerated copy, not the committed one), leaving the NEXT migration
      # to be authored against a stale schema. strings/licenses have verify* gates; schemas
      # had none. This is the generic backstop: any tracked file the build rewrites fails here.
      - name: Verify no generated-artifact drift
        run: |
          if ! git diff --exit-code; then
            echo "::error::Tracked files were modified by the build — commit the regenerated artifacts (see the diff above)."
            exit 1
          fi

      # The E2E retry extensions (app/sharedLogic + server ProjectConfig) absorb transient
      # failures, so a flaking spec can trend worse while runs stay green. Each retry is
      # appended to <module>/build/e2e-retries.log; surface it in the job summary so
      # retries are visible per-PR without failing the build. The RetryExtensionProbe
      # specs retry BY DESIGN every run — filtered out so the summary is signal-only.
      - name: Report E2E auto-retries in job summary
        if: always()
        run: |
          found=0
          for f in app/sharedLogic/build/e2e-retries.log server/build/e2e-retries.log; do
            [ -f "$f" ] || continue
            entries=$(grep -v 'RetryExtensionProbeE2ETest' "$f" || true)
            [ -n "$entries" ] || continue
            if [ "$found" -eq 0 ]; then
              echo '## E2E auto-retries (absorbed by the retry extension)' >> "$GITHUB_STEP_SUMMARY"
              found=1
            fi
            echo "**\`$f\`**" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$entries" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          done
          if [ "$found" -eq 0 ]; then
            echo 'No E2E auto-retries recorded (probe retries excluded).'
          fi

      # Coverage signal (non-gating): Kover is applied on the JVM-pure modules only
      # (:server, :tools:rpc-guard-ksp) — the androidKmpLibrary modules are unsupported
      # upstream. The XML artifact enables future diff-coverage tooling; there is
      # deliberately NO threshold/verify gate here.
      - name: Generate coverage reports (Kover, non-gating)
        continue-on-error: true
        run: ./gradlew :server:koverXmlReport :tools:rpc-guard-ksp:koverXmlReport --no-daemon

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: kover-coverage
          path: |
            server/build/reports/kover/report.xml
            tools/rpc-guard-ksp/build/reports/kover/report.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: jvm-test-results
          path: |
            app/sharedLogic/build/reports/tests/
            server/build/reports/tests/
            app/sharedLogic/build/e2e-retries.log
            server/build/e2e-retries.log
          retention-days: 7

  test-ios:
    name: Test (iOS)
    runs-on: macos-26
    # Fail-fast-visible. The iOS test suite is fast (~363 tests in ~35s warm); the time
    # is the cold Kotlin/Native + Swift-Export framework compile + simulator boot. A cold
    # build is well under 30m even with empty Konan/Gradle caches (the post-merge Release
    # build is ~16m cold). 45m leaves comfortable margin for a legitimate cold run while
    # turning a wedged build (which otherwise burns the ~50m default-ish runner ceiling) into
    # a clean, visible failure instead of a silent hang.
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: '26.4.1'

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      # The Xcode "Compile Kotlin Framework" run-script hardcodes
      # JAVA_HOME=/opt/homebrew/opt/openjdk@21/... — ensure that path exists.
      - name: Ensure openjdk@21 at the hardcoded path
        run: brew install openjdk@21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Cache Konan (Kotlin/Native)
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-konan-

      - name: Resolve a simulator destination
        id: sim
        run: |
          xcrun simctl list devices available | grep iPhone || true
          DEVICE=$(xcrun simctl list devices available --json \
            | python3 -c '
          import json,sys,re
          d=json.load(sys.stdin)["devices"]
          cands=[x["name"] for rt,ds in d.items() if "iOS" in rt for x in ds if x["name"].startswith("iPhone")]
          pref=[n for n in cands if n=="iPhone 17"]
          name=pref[0] if pref else sorted(cands, key=lambda s:[int(t) for t in re.findall(r"\d+",s)] or [0])[-1]
          print(name)')
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Run iOS tests
        working-directory: iosApp
        run: |
          set -o pipefail
          # Per-test timeouts: a hung test (never-completing await / black-hole Flow) fails fast with
          # its own name after 120s instead of freezing the whole run until the 45-min job timeout —
          # which surfaced as an opaque "operation was canceled" with no culprit. Individual tests may
          # opt into longer via executionTimeAllowance, capped at the 300s maximum.
          xcodebuild test \
            -scheme ListenUp \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }},OS=latest" \
            -resultBundlePath "$RUNNER_TEMP/ios-test.xcresult" \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 120 \
            -maximum-test-execution-time-allowance 300

      - name: Upload iOS test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ios-test-results
          path: ${{ runner.temp }}/ios-test.xcresult
          retention-days: 7

      # Gates the iOS Swift Export surface — the flat-typealias layer the patcher
      # appends onto the generated `Shared.swift` (the caller-facing `import Shared`
      # surface), NOT the ObjC `Shared.h`. The xcodebuild step above already
      # generated + patched the SPM package, so the script auto-discovers
      # `app/sharedLogic/build/SPMPackage/**/Shared.swift` and diffs it against the
      # committed baseline (tools/scripts/export-surface-baseline.txt), failing on a banned
      # name or an unreviewed addition. See CLAUDE.md "Export Surface".
      - name: Export-surface inventory (gate)
        if: always()
        run: bash tools/scripts/export-surface-inventory.sh

      - name: No AppResult await from Swift (gate)
        if: always()
        run: bash tools/scripts/check-no-appresult-await.sh

  # ── Build ────────────────────────────────────────────────────────────────────
  build-server-native:
    name: Build & Test (server linuxX64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Gate behind lint + JVM tests so a broken compile can't land on a passing test run.
    needs: [lint, test-jvm]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Cache Konan (Kotlin/Native)
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-konan-

      - name: Install native link dependencies (libargon2 + libsqlite3 + libcurl)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libargon2-dev libsqlite3-dev libcurl4-openssl-dev

      - name: Compile :server linuxX64
        run: ./gradlew :server:compileKotlinLinuxX64 --no-daemon

      - name: Run :server linuxX64 tests
        run: ./gradlew :server:linuxX64Test --no-daemon

  build-android:
    name: Build (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Don't build the APK unless Kotlin lint + JVM tests pass.
    needs: [lint, test-jvm]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build debug APK
        run: ./gradlew :app:androidApp:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/androidApp/build/outputs/apk/debug/*.apk
          retention-days: 14

  build-ios:
    name: Build (iOS)
    runs-on: macos-26
    # The expensive Release build is ~16m cold; 45m leaves margin for a slow cold runner
    # while killing a wedge instead of letting it run to the runner ceiling.
    timeout-minutes: 45
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # The expensive build (~16m) — gate it behind lint + JVM tests + iOS tests so we
    # never spend it on code that already failed an earlier stage.
    needs: [lint, test-jvm, test-ios]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: '26.4.1'

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Ensure openjdk@21 at the hardcoded path
        run: brew install openjdk@21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Cache Konan (Kotlin/Native)
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-konan-

      - name: Build (Release, unsigned)
        working-directory: iosApp
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme ListenUp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO
