name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run unit tests
        run: ./gradlew :sharedLogic:jvmTest --no-daemon

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: sharedLogic/build/reports/tests/
          retention-days: 7

  server-test:
    name: Server Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build server
        run: ./gradlew :server:build --no-daemon

      - name: Run server tests
        run: ./gradlew :server:test --no-daemon

      - name: Upload server test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-test-results
          path: server/build/reports/tests/
          retention-days: 7

  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Check formatting (Spotless)
        run: ./gradlew spotlessCheck --no-daemon

      - name: Run static analysis (Detekt)
        run: ./gradlew detekt --no-daemon

      - name: Upload Detekt report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: detekt-report
          path: build/reports/detekt/
          retention-days: 7

  ios-test:
    name: iOS Tests
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # The Xcode "Compile Kotlin Framework" run-script hardcodes
      # JAVA_HOME=/opt/homebrew/opt/openjdk@21/... — ensure that path exists.
      - name: Ensure openjdk@21 at the hardcoded path
        run: brew install openjdk@21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Cache Konan (Kotlin/Native)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-konan-

      - name: Resolve a simulator destination
        id: sim
        run: |
          xcrun simctl list devices available | grep iPhone || true
          DEVICE=$(xcrun simctl list devices available --json \
            | python3 -c '
          import json,sys,re
          d=json.load(sys.stdin)["devices"]
          cands=[x["name"] for rt,ds in d.items() if "iOS" in rt for x in ds if x["name"].startswith("iPhone")]
          pref=[n for n in cands if n=="iPhone 17"]
          name=pref[0] if pref else sorted(cands, key=lambda s:[int(t) for t in re.findall(r"\d+",s)] or [0])[-1]
          print(name)')
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Run iOS tests
        working-directory: iosApp
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme ListenUp \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }},OS=latest" \
            -resultBundlePath "$RUNNER_TEMP/ios-test.xcresult"

      - name: Upload iOS test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-test-results
          path: ${{ runner.temp }}/ios-test.xcresult
          retention-days: 7

  ios-build:
    name: iOS Build
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Ensure openjdk@21 at the hardcoded path
        run: brew install openjdk@21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Cache Konan (Kotlin/Native)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-konan-

      - name: Build (Release, unsigned)
        working-directory: iosApp
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme ListenUp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [test, server-test, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 14
