name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# CI is organized into three conceptual stages — Lint, Test, Build — each spanning the
# lanes a stage needs. Mobile-focused: Linux lane (shared Kotlin + server + Android) and
# macOS lane (iOS). Desktop is intentionally not built — the two mobile builds already
# compile all shared Kotlin across both backends (Android → JVM/Android; iOS → Native).
jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Check formatting (Spotless)
        run: ./gradlew spotlessCheck --no-daemon

      - name: Run static analysis (Detekt)
        run: ./gradlew detekt --no-daemon

      # SwiftLint runs on Linux against .swift source (no Xcode needed) via the official
      # container, pinned to match local. Non-strict: error-severity violations gate;
      # style is advisory. Config: iosApp/.swiftlint.yml.
      - name: Run SwiftLint (iOS)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/iosApp:/work" -w /work \
            ghcr.io/realm/swiftlint:0.63.3 \
            swiftlint lint --reporter github-actions-logging

      - name: Upload Detekt report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: detekt-report
          path: build/reports/detekt/
          retention-days: 7

  # ── Test ─────────────────────────────────────────────────────────────────────
  test-jvm:
    name: Test (JVM)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # Drift gate: regenerates localization artifacts from en.json into memory and
      # compares against the committed Android strings.xml + iOS Localizable.xcstrings,
      # failing with a per-file message if en.json was edited without regenerating (or
      # an artifact was hand-edited).
      - name: Verify localization artifacts in sync
        run: ./gradlew :sharedUI:verifyStrings --no-daemon

      # Kotest across the contract DTOs, the shared client core (every client consumes
      # :sharedLogic), and the server. :sharedUI host tests are Robolectric (JVM, no
      # emulator) — included here so Compose-UI test rot can't land unnoticed.
      - name: Run JVM tests
        run: ./gradlew :contract:jvmTest :sharedLogic:jvmTest :server:test :sharedUI:testAndroidHostTest --no-daemon

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jvm-test-results
          path: |
            sharedLogic/build/reports/tests/
            server/build/reports/tests/
          retention-days: 7

  test-ios:
    name: Test (iOS)
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # The Xcode "Compile Kotlin Framework" run-script hardcodes
      # JAVA_HOME=/opt/homebrew/opt/openjdk@21/... — ensure that path exists.
      - name: Ensure openjdk@21 at the hardcoded path
        run: brew install openjdk@21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Cache Konan (Kotlin/Native)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-konan-

      - name: Resolve a simulator destination
        id: sim
        run: |
          xcrun simctl list devices available | grep iPhone || true
          DEVICE=$(xcrun simctl list devices available --json \
            | python3 -c '
          import json,sys,re
          d=json.load(sys.stdin)["devices"]
          cands=[x["name"] for rt,ds in d.items() if "iOS" in rt for x in ds if x["name"].startswith("iPhone")]
          pref=[n for n in cands if n=="iPhone 17"]
          name=pref[0] if pref else sorted(cands, key=lambda s:[int(t) for t in re.findall(r"\d+",s)] or [0])[-1]
          print(name)')
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Run iOS tests
        working-directory: iosApp
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme ListenUp \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }},OS=latest" \
            -resultBundlePath "$RUNNER_TEMP/ios-test.xcresult"

      - name: Upload iOS test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-test-results
          path: ${{ runner.temp }}/ios-test.xcresult
          retention-days: 7

  # ── Build ────────────────────────────────────────────────────────────────────
  build-android:
    name: Build (Android)
    runs-on: ubuntu-latest
    # Don't build the APK unless Kotlin lint + JVM tests pass.
    needs: [lint, test-jvm]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 14

  build-ios:
    name: Build (iOS)
    runs-on: macos-26
    # The expensive build (~16m) — gate it behind lint + JVM tests + iOS tests so we
    # never spend it on code that already failed an earlier stage.
    needs: [lint, test-jvm, test-ios]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Ensure openjdk@21 at the hardcoded path
        run: brew install openjdk@21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Cache Konan (Kotlin/Native)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-konan-

      - name: Build (Release, unsigned)
        working-directory: iosApp
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme ListenUp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO
