# ListenUp Client — Release Pipeline
#
# Manual, per-platform release. Version comes from the VERSION file; the optional
# `version` input bumps it (commits + tags). Android → Play internal/draft,
# iOS → TestFlight, server → GHCR (non-blocking until #647 clears).

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version (blank = use current VERSION file)"
        required: false
        type: string
      android:
        description: "Release Android"
        type: boolean
        default: true
      ios:
        description: "Release iOS (TestFlight)"
        type: boolean
        default: true
      server:
        description: "Release server (GHCR)"
        type: boolean
        default: true

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  set-version:
    name: Resolve version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve and (optionally) bump version
        id: resolve
        run: |
          set -euo pipefail
          INPUT="${{ inputs.version }}"
          if [ -n "$INPUT" ]; then
            CLEAN="${INPUT#v}"
            echo "$CLEAN" > VERSION
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add VERSION
            git commit -m "🔖 chore: release v$CLEAN"
            git tag "v$CLEAN"
            git push origin HEAD:main
            git push origin "v$CLEAN"
            VERSION="$CLEAN"
          else
            VERSION="$(tr -d '[:space:]' < VERSION)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $VERSION"

  android:
    name: Android → Play (internal/draft)
    runs-on: ubuntu-latest
    needs: set-version
    if: ${{ inputs.android }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ runner.temp }}/release.keystore

      - name: Build signed AAB + APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :androidApp:bundleRelease :androidApp:assembleRelease --no-daemon

      - name: Upload to Google Play (internal, draft)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.calypsan.listenup.client
          releaseFiles: androidApp/build/outputs/bundle/release/*.aab
          track: internal
          status: draft

      - name: Upload artifacts for GitHub Release
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            androidApp/build/outputs/bundle/release/*.aab
            androidApp/build/outputs/apk/release/*.apk
          retention-days: 30
