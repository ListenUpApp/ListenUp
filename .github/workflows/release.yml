# ListenUp Client — Release Pipeline
#
# Manual, per-platform release. Version comes from the VERSION file; the optional
# `version` input bumps it (commits + tags). Android → Play internal/draft,
# iOS → TestFlight, server → GHCR (non-blocking until #647 clears).

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version (blank = use current VERSION file)"
        required: false
        type: string
      android:
        description: "Release Android"
        type: boolean
        default: true
      ios:
        description: "Release iOS (TestFlight)"
        type: boolean
        default: true
      server:
        description: "Release server (GHCR)"
        type: boolean
        default: true

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  set-version:
    name: Resolve version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve and (optionally) bump version
        id: resolve
        run: |
          set -euo pipefail
          INPUT="${{ inputs.version }}"
          if [ -n "$INPUT" ]; then
            CLEAN="${INPUT#v}"
            echo "$CLEAN" > VERSION
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add VERSION
            git commit -m "🔖 chore: release v$CLEAN"
            git tag "v$CLEAN"
            git push origin HEAD:main
            git push origin "v$CLEAN"
            VERSION="$CLEAN"
          else
            VERSION="$(tr -d '[:space:]' < VERSION)"
          fi
          SHA="$(git rev-parse HEAD)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $VERSION (sha $SHA)"

  android:
    name: Android → Play (internal/draft)
    runs-on: ubuntu-latest
    needs: set-version
    if: ${{ inputs.android }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.set-version.outputs.sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ runner.temp }}/release.keystore

      - name: Build signed AAB + APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :androidApp:bundleRelease :androidApp:assembleRelease --no-daemon

      - name: Upload to Google Play (internal, draft)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.calypsan.listenup.client
          releaseFiles: androidApp/build/outputs/bundle/release/*.aab
          track: internal
          status: draft

      - name: Upload artifacts for GitHub Release
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            androidApp/build/outputs/bundle/release/*.aab
            androidApp/build/outputs/apk/release/*.apk
          retention-days: 30

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [set-version, android]
    if: ${{ always() && needs.set-version.result == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Download Android artifacts
        if: ${{ inputs.android && needs.android.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: artifacts

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.set-version.outputs.version }}
          name: v${{ needs.set-version.outputs.version }}
          generate_release_notes: true
          files: artifacts/**/*
          fail_on_unmatched_files: false

  ios:
    name: iOS → TestFlight
    runs-on: macos-26
    needs: set-version
    if: ${{ inputs.ios }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.set-version.outputs.sha }}

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Ensure openjdk@21 at the hardcoded path
        run: brew install openjdk@21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-konan-

      - name: Import distribution certificate
        env:
          CERT_P12: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$CERT_P12" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          # shellcheck disable=SC2046
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" "$KEYCHAIN"

      # Apple-native build → upload. `xcodebuild -exportArchive` with destination=upload
      # in ExportOptions.plist delivers the build to App Store Connect / TestFlight directly,
      # authenticated by the ASC API key. `-allowProvisioningUpdates` lets xcodebuild manage
      # signing via that key (no manual provisioning profile needed). No Ruby/Fastlane.
      - name: Archive, export & upload to TestFlight
        working-directory: iosApp
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8_BASE64 }}
          MARKETING_VERSION: ${{ needs.set-version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$ASC_KEY_P8" | base64 -d > "$KEY_PATH"
          ARCHIVE="$RUNNER_TEMP/ListenUp.xcarchive"

          xcodebuild archive \
            -scheme ListenUp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE" \
            -authenticationKeyPath "$KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -allowProvisioningUpdates \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export" \
            -authenticationKeyPath "$KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -allowProvisioningUpdates

  server:
    name: Server → GHCR (non-blocking until #647)
    runs-on: ubuntu-latest
    needs: set-version
    if: ${{ inputs.server }}
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.set-version.outputs.sha }}

      - name: Set up GraalVM 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native binary
        run: ./gradlew :server:nativeCompile --no-configuration-cache --no-daemon

      - name: Stage binary for Docker
        run: find server/build/native/nativeCompile -maxdepth 1 -type f -perm -u+x -exec cp {} server/server-binary \;

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/Dockerfile.native
          push: true
          tags: |
            ghcr.io/listenupapp/listenup-server:${{ needs.set-version.outputs.version }}
            ghcr.io/listenupapp/listenup-server:${{ github.sha }}
            ghcr.io/listenupapp/listenup-server:latest
