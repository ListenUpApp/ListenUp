# ListenUp Client — Release Pipeline
#
# Manual, per-platform release. Version comes from the VERSION file; the optional
# `version` input bumps it (commits + tags). Android → Play internal/draft,
# iOS → TestFlight, server → GHCR (non-blocking until #647 clears).

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version (blank = use current VERSION file)"
        required: false
        type: string
      android:
        description: "Release Android"
        type: boolean
        default: true
      ios:
        description: "Release iOS (TestFlight)"
        type: boolean
        default: true
      server:
        description: "Release server (GHCR)"
        type: boolean
        default: true

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  set-version:
    name: Resolve version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve and (optionally) bump version
        id: resolve
        run: |
          set -euo pipefail
          INPUT="${{ inputs.version }}"
          if [ -n "$INPUT" ]; then
            CLEAN="${INPUT#v}"
            echo "$CLEAN" > VERSION
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add VERSION
            git commit -m "🔖 chore: release v$CLEAN"
            git tag "v$CLEAN"
            git push origin HEAD:main
            git push origin "v$CLEAN"
            VERSION="$CLEAN"
          else
            VERSION="$(tr -d '[:space:]' < VERSION)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $VERSION"
