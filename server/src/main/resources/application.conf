ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.calypsan.listenup.server.ApplicationKt.module ]
    }
}

app {
    # Instance display name, shown on the public invite landing page. Defaults to
    # "ListenUp" when unset or blank.
    serverName = "ListenUp"
    serverName = ${?LISTENUP_SERVER_NAME}
}

database {
    # Blank by default: the server stores its SQLite database at
    # $LISTENUP_HOME/listenup.db, where LISTENUP_HOME defaults to ~/ListenUp
    # (resolved in code — HOCON cannot expand ~ or $HOME). Set LISTENUP_HOME to
    # relocate all application data. Tests inject an explicit jdbcUrl directly.
    jdbcUrl = ""
}

auth {
    # Server-side pepper for HMAC-SHA-256 of refresh tokens. The default below is
    # an obvious test marker — production deployments MUST set
    # LISTENUP_REFRESH_PEPPER to a 32+ byte secret. Rotating the pepper invalidates
    # every stored hash and forces all sessions to re-authenticate.
    refreshPepper = "test-pepper-change-in-production-this-must-be-32-bytes-or-more"
    refreshPepper = ${?LISTENUP_REFRESH_PEPPER}
}

jwt {
    # HS256 signing secret. Must be at least 32 bytes. The default below is an
    # obvious test marker — production deployments MUST set LISTENUP_JWT_SECRET.
    secret = "test-jwt-secret-change-in-production-at-least-32-bytes-please"
    secret = ${?LISTENUP_JWT_SECRET}
    issuer = "listenup"
    audience = "listenup-client"
}

registration {
    # OPEN | APPROVAL_QUEUE | CLOSED. Drives register() branching in AuthService.
    policy = "OPEN"
    policy = ${?LISTENUP_REGISTRATION_POLICY}
}

scanner {
    # OS-path-separator-delimited list of absolute folder paths to seed as folders
    # of the singleton library on first boot (e.g. "/audio/books:/audio/podcasts"
    # on Unix, "/audio/books;/audio/podcasts" on Windows). Each entry must point to
    # an existing directory; non-directory entries are skipped with a warning.
    # If unset (empty), the server starts with a path-less library; folders can be
    # added later via the LibraryAdmin RPC/REST surface.
    libraryPath = ""
    libraryPath = ${?LISTENUP_LIBRARY_PATH}

    # Textual-metadata precedence — a comma-separated, highest-first list of
    # signal sources: metadata.json, embedded, sidecar, filename, folder. A
    # source left out is never consulted. Blank uses the default order shown.
    # An invalid token fails server startup loud.
    metadataPrecedence = ""
    metadataPrecedence = ${?LISTENUP_METADATA_PRECEDENCE}

    # Maximum number of embedded-artwork covers held in the in-memory LRU cache.
    # ~1000 covers at a few KB each is a negligible heap footprint; raise it for
    # very large libraries with heavy cover browsing.
    embeddedCoverCacheSize = 1000
    embeddedCoverCacheSize = ${?LISTENUP_EMBEDDED_COVER_CACHE_SIZE}
}

seed {
    profile = ""
    profile = ${?LISTENUP_SEED_PROFILE}
}

scan {
    # Re-walk every library once on startup to catch changes made while the server was down.
    rescanOnStartup = true
    rescanOnStartup = ${?LISTENUP_SCAN_RESCAN_ON_STARTUP}

    # Periodic full-rescan backstop interval (Kotlin Duration format, e.g. "6h", "30m").
    # "0" or blank disables the periodic loop; the live watcher still runs.
    periodicRescanInterval = "6h"
    periodicRescanInterval = ${?LISTENUP_SCAN_PERIODIC_RESCAN_INTERVAL}
}
